function b64(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
async function decryptApp(pwd){
  var salt=b64(CFG.salt), iv=b64(CFG.iv), data=b64(CFG.data);
  var baseKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(pwd),{name:'PBKDF2'},false,['deriveKey']);
  var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:CFG.iter,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
  var plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,data);
  return new TextDecoder().decode(plain);
}
function openApp(htmlStr){
  document.open(); document.write(htmlStr); document.close();
}
async function tryUnlock(pwd, remember){
  var err=document.getElementById('err'), spin=document.getElementById('spin');
  err.textContent=''; spin.style.display='block';
  try{
    var htmlStr=await decryptApp(pwd);
    if(remember){ try{ localStorage.setItem('salome_unlock', pwd); }catch(e){} }
    openApp(htmlStr);
  }catch(e){
    spin.style.display='none';
    err.textContent='Mot de passe incorrect ❌';
    try{ localStorage.removeItem('salome_unlock'); }catch(_){}
  }
}
document.getElementById('go').addEventListener('click', function(){
  var u=document.getElementById('u').value.trim().toLowerCase();
  var p=document.getElementById('p').value;
  var r=document.getElementById('r').checked;
  var err=document.getElementById('err');
  if(u!==CFG.user){ err.textContent='Identifiant incorrect ❌'; return; }
  if(!p){ err.textContent='Entre ton mot de passe'; return; }
  tryUnlock(p, r);
});
document.getElementById('p').addEventListener('keyup', function(e){ if(e.key==='Enter') document.getElementById('go').click(); });
// auto-déverrouillage si "se souvenir"
(function(){
  try{
    var saved=localStorage.getItem('salome_unlock');
    if(saved){ document.getElementById('u').value=CFG.user; tryUnlock(saved, true); }
  }catch(e){}
})();
</script>
