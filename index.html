<title>L'Aventure de l'Hébreu 🔒</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;
  background:linear-gradient(160deg,#5b21b6,#2563eb);color:#1e1b4b}
.box{background:#fff;border-radius:24px;padding:28px 24px;width:330px;max-width:92vw;
  box-shadow:0 20px 50px rgba(0,0,0,.3);text-align:center}
.logo{font-size:54px}
h1{font-size:20px;margin:6px 0 2px}
p.s{color:#6b7280;font-size:13px;margin:0 0 18px}
label{display:block;text-align:left;font-size:12.5px;font-weight:bold;color:#4b5563;margin:10px 0 4px}
input[type=text],input[type=password]{width:100%;padding:12px 14px;border:2px solid #e5e7eb;border-radius:12px;font-size:16px;outline:none}
input:focus{border-color:#7c3aed}
.row{display:flex;align-items:center;gap:8px;margin:14px 0 4px;font-size:13px;color:#4b5563;justify-content:flex-start}
button{width:100%;margin-top:16px;padding:14px;border:none;border-radius:14px;font-size:16px;font-weight:bold;color:#fff;
  background:linear-gradient(135deg,#7c3aed,#2563eb);cursor:pointer;box-shadow:0 8px 20px rgba(76,29,149,.3)}
button:active{transform:translateY(2px)}
.err{color:#ef4444;font-size:13px;font-weight:bold;margin-top:10px;min-height:18px}
.lock{font-size:11px;color:#9ca3af;margin-top:16px}
.spin{display:none;margin-top:10px;color:#7c3aed;font-weight:bold;font-size:13px}
</style>
</head>

<div class="box">
  <div class="logo">🔒📖</div>
  <h1>L'Aventure de l'Hébreu</h1>
  <p class="s">Espace privé · connexion</p>
  <form id="f" onsubmit="return false">
    <label>Identifiant</label>
    <input type="text" id="u" autocomplete="username" placeholder="salome ou ethan" autocapitalize="none">
    <label>Mot de passe</label>
    <input type="password" id="p" autocomplete="current-password" placeholder="••••••••">
    <div class="row"><input type="checkbox" id="r" style="width:auto"> <label for="r" style="margin:0;font-weight:normal">Se souvenir de moi sur cet appareil</label></div>
    <button id="go">Entrer dans l'aventure ➜</button>
    <div class="spin" id="spin">🔓 Déverrouillage…</div>
    <div class="err" id="err"></div>
  </form>
  <div class="lock">🔐 Application chiffrée (AES-256). Illisible sans le mot de passe.</div>
</div>

function b64(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
async function decryptApp(user, pwd){
  var u=CFG.users[user];
  if(!u) throw new Error('no-user');
  var salt=b64(u.salt), iv=b64(u.iv), wrap=b64(u.wrap);
  var baseKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(pwd),{name:'PBKDF2'},false,['deriveKey']);
  var kdf=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:CFG.iter,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
  var masterRaw=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},kdf,wrap); // -> 32 octets
  var masterKey=await crypto.subtle.importKey('raw',masterRaw,{name:'AES-GCM'},false,['decrypt']);
  var plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(CFG.appIv)},masterKey,b64(CFG.appData));
  return new TextDecoder().decode(plain);
}
function openApp(htmlStr, user){
  try{ window.__APP_USER__=user; }catch(e){}
  var inj='<script>window.__APP_USER__='+JSON.stringify(user)+';<\/script>';
  htmlStr=htmlStr.replace('<head>','<head>'+inj);
  document.open(); document.write(htmlStr); document.close();
}
async function tryUnlock(user, pwd, remember){
  var err=document.getElementById('err'), spin=document.getElementById('spin');
  err.textContent=''; spin.style.display='block';
  try{
    var htmlStr=await decryptApp(user, pwd);
    if(remember){ try{ localStorage.setItem('hebreu_login', JSON.stringify({u:user,p:pwd})); }catch(e){} }
    openApp(htmlStr, user);
  }catch(e){
    spin.style.display='none';
    err.textContent='Identifiant ou mot de passe incorrect ❌';
    try{ localStorage.removeItem('hebreu_login'); }catch(_){}
  }
}
document.getElementById('go').addEventListener('click', function(){
  var u=document.getElementById('u').value.trim().toLowerCase();
  var p=document.getElementById('p').value;
  var err=document.getElementById('err');
  if(!u){ err.textContent='Entre ton identifiant'; return; }
  if(!CFG.users[u]){ err.textContent='Cet identifiant n\'existe pas ❌'; return; }
  if(!p){ err.textContent='Entre ton mot de passe'; return; }
  tryUnlock(u, p, document.getElementById('r').checked);
});
document.getElementById('p').addEventListener('keyup', function(e){ if(e.key==='Enter') document.getElementById('go').click(); });
document.getElementById('u').addEventListener('keyup', function(e){ if(e.key==='Enter') document.getElementById('p').focus(); });
// auto-déverrouillage si "se souvenir"
(function(){
  try{
    var saved=localStorage.getItem('hebreu_login');
    if(saved){ var o=JSON.parse(saved); if(o&&o.u&&CFG.users[o.u]){ document.getElementById('u').value=o.u; tryUnlock(o.u,o.p,true); } }
  }catch(e){}
})();
